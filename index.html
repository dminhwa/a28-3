// ------------------- TEXTS -------------------
let texts=[];
let sentences=[];

// ------------------- HEART SHAPE -------------------
function heart(t){
  let x = 16*Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x,y};
}

// ------------------- CREATE IMAGES -------------------
for(let i=0;i<total;i++){
  let id = Math.floor(Math.random()*imageCount)+1;
  let texture = loader.load(`img/${id}.jpg`);
  let material = new THREE.MeshBasicMaterial({map:texture,side:THREE.DoubleSide});
  let size = Math.random()*(window.innerWidth<768?12:20)+10;
  let geometry = new THREE.PlaneGeometry(size,size);
  let mesh = new THREE.Mesh(geometry,material);

  let t = (i/total)*Math.PI*2;
  let h = heart(t);
  mesh.position.set(h.x*2.2,h.y*2.2,0);
  scene.add(mesh);
  images.push(mesh);

  targets.push(new THREE.Vector3(
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*800
  ));
}

// ------------------- EXPLODE -------------------
let exploded=false;
window.addEventListener("click",()=>{exploded=true;});
function explodeImages(){
  images.forEach((img,i)=>{img.position.lerp(targets[i],0.03);});
}
function rotateImages(){
  images.forEach(img=>{img.rotation.y += 0.002; img.rotation.x += 0.001;});
}

// ------------------- FLOATING TEXT -------------------
function createFloatingText(){
  if(sentences.length === 0) return;
  let text = sentences[Math.floor(Math.random()*sentences.length)];
  let canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");
  canvas.width = 512;
  canvas.height = 128;
  ctx.fillStyle = "white";
  ctx.font = (window.innerWidth<768?"24px":"40px") + " Arial";
  ctx.textAlign = "center";
  ctx.fillText(text, canvas.width/2, canvas.height/2 + 12);
  let texture = new THREE.CanvasTexture(canvas);
  let material = new THREE.SpriteMaterial({map:texture,transparent:true});
  let sprite = new THREE.Sprite(material);
  let scale = window.innerWidth<768?50:80;
  sprite.scale.set(scale,scale/4,1);
  sprite.position.set(
    (Math.random()-0.5)*600,
    (Math.random()-0.5)*600,
    (Math.random()-0.5)*600
  );
  scene.add(sprite);
  texts.push(sprite);
}

// ------------------- ANIMATE -------------------
function animate(){
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0003;

  if(exploded){explodeImages(); rotateImages();}

  texts.forEach(t=>{
    t.position.y += 0.02;
    if(t.position.y>400) t.position.y=-400;
  });

  controls.update();
  renderer.render(scene,camera);
}
animate();

// ------------------- RESIZE -------------------
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
