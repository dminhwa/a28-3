<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Heart Gallery</title>

<style>
body{
margin:0;
overflow:hidden;
background:#050015;
}
</style>

</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ================= MOBILE DETECT =================

function detectMobile(){
return (
/Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent)
|| ('ontouchstart' in window)
|| navigator.maxTouchPoints>0
)
}

const isMobile = true;

// ================= CONFIG =================

const PC = {

cameraZ:160,

stars:6000,

totalImages:120,

imageFolderSize:75,

floatingTexts:400,

explodeRange:900,

starRange:2000,

imageSizeMin:10,
imageSizeMax:30,

rotateSpeed:0.002,

textCanvasWidth:512,
textCanvasHeight:128,

textFont:"40px Arial",
textScale:80

}

const MOBILE = {

cameraZ:180,

stars:1200,

totalImages:40,

imageFolderSize:75,

floatingTexts:100,

explodeRange:600,

starRange:1500,

imageSizeMin:8,
imageSizeMax:18,

rotateSpeed:0.001,

textCanvasWidth:256,
textCanvasHeight:64,

textFont:"24px Arial",
textScale:40

}

const CONFIG = isMobile ? MOBILE : PC

console.log("Mobile:",isMobile)


// ================= SCENE =================

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
)

camera.position.z = CONFIG.cameraZ


// ================= RENDERER =================

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5))

document.body.appendChild(renderer.domElement)


// ================= CONTROLS =================

const controls = new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping = true
controls.dampingFactor = 0.08
controls.enablePan = false

controls.rotateSpeed = isMobile ? 0.25 : 0.6

controls.enableZoom = true
controls.zoomSpeed = isMobile ? 0.5 : 1.4

controls.minDistance = 40
controls.maxDistance = isMobile ? 800 : 1200


// ================= STARS =================

const starGeo = new THREE.BufferGeometry()

let starVertices=[]

for(let i=0;i<CONFIG.stars;i++){

starVertices.push(

(Math.random()-0.5)*CONFIG.starRange,
(Math.random()-0.5)*CONFIG.starRange,
(Math.random()-0.5)*CONFIG.starRange

)

}

starGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVertices,3)
)

const starMat = new THREE.PointsMaterial({
color:0xffffff,
size:isMobile?1:1.4
})

const stars = new THREE.Points(starGeo,starMat)

scene.add(stars)


// ================= HEART SHAPE =================

function heart(t){

let x = 16*Math.pow(Math.sin(t),3)

let y =
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t)

return {x,y}

}


// ================= IMAGES =================

const loader = new THREE.TextureLoader()

let images=[]
let targets=[]

for(let i=0;i<CONFIG.totalImages;i++){

let id = Math.floor(Math.random()*CONFIG.imageFolderSize)+1

let texture = loader.load(`img/${id}.jpg`)

let material = new THREE.MeshBasicMaterial({
map:texture,
side:THREE.DoubleSide
})

let size =
Math.random()*
(CONFIG.imageSizeMax-CONFIG.imageSizeMin)
+CONFIG.imageSizeMin

let geometry = new THREE.PlaneGeometry(size,size)

let mesh = new THREE.Mesh(geometry,material)

let t = (i/CONFIG.totalImages)*Math.PI*2

let h = heart(t)

mesh.position.set(h.x*2.2,h.y*2.2,0)

scene.add(mesh)

images.push(mesh)

targets.push(
new THREE.Vector3(
(Math.random()-0.5)*CONFIG.explodeRange,
(Math.random()-0.5)*CONFIG.explodeRange,
(Math.random()-0.5)*CONFIG.explodeRange
)
)

}


// ================= FLOATING TEXT =================

let sentences=[]
let texts=[]

function createText(){

if(sentences.length===0)return

let text = sentences[Math.floor(Math.random()*sentences.length)]

let canvas = document.createElement("canvas")

canvas.width = CONFIG.textCanvasWidth
canvas.height = CONFIG.textCanvasHeight

let ctx = canvas.getContext("2d")

ctx.fillStyle="white"

ctx.font = CONFIG.textFont

ctx.textAlign="center"

ctx.fillText(
text,
canvas.width/2,
canvas.height/2+12
)

let texture = new THREE.CanvasTexture(canvas)

let material = new THREE.SpriteMaterial({
map:texture,
transparent:true
})

let sprite = new THREE.Sprite(material)

sprite.scale.set(CONFIG.textScale,CONFIG.textScale/4,1)

sprite.position.set(

(Math.random()-0.5)*CONFIG.explodeRange,
(Math.random()-0.5)*CONFIG.explodeRange,
(Math.random()-0.5)*CONFIG.explodeRange

)

scene.add(sprite)

texts.push(sprite)

}


// ================= LOAD SENTENCES =================

fetch("sentences.json")
.then(res=>res.json())
.then(data=>{

sentences=data

for(let i=0;i<CONFIG.floatingTexts;i++){

createText()

}

})


// ================= EXPLODE =================

let exploded=false

function explodeTrigger(){

exploded=true

}

window.addEventListener("click",explodeTrigger)

window.addEventListener("touchstart",explodeTrigger)


// ================= ANIMATION =================

function explodeImages(){

images.forEach((img,i)=>{

img.position.lerp(targets[i],0.03)

})

}

function rotateImages(){

images.forEach(img=>{

img.rotation.y+=CONFIG.rotateSpeed
img.rotation.x+=CONFIG.rotateSpeed*0.5

})

}


// ================= LOOP =================

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0003

if(exploded){

explodeImages()

rotateImages()

}

texts.forEach(t=>{

t.position.y+=0.02

if(t.position.y>400){

t.position.y=-400

}

})

controls.update()

renderer.render(scene,camera)

}

animate()


// ================= RESIZE =================

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(
window.innerWidth,
window.innerHeight
)

})

</script>

</body>
</html>
