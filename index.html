<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Heart Gallery Responsive</title>
<style>
body { margin:0; overflow:hidden; background:#050015; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// ------------------- CONFIGURATION -------------------
const PC = {
  cameraZ: 160,
  stars: 6000,
  imageCount: 75,
  totalImages: 120,
  floatingTextCount: 400,
  orbitRotateSpeed: 0.6,
  orbitZoomSpeed: 1.4,
  orbitMaxDistance: 1200,
  starRange: 2000,
  explodeRange: 800,
  imageSizeMin: 10,
  imageSizeMax: 30,
  textCanvas: {width:512, height:128},
  textFont: "40px Arial",
  textScale: 80
};

const MOBILE = {
  cameraZ: 180,
  stars: 1500,
  imageCount: 75,
  totalImages: 40,
  floatingTextCount: 120,
  orbitRotateSpeed: 0.25,
  orbitZoomSpeed: 0.6,
  orbitMaxDistance: 800,
  starRange: 1500,
  explodeRange: 600,
  imageSizeMin: 10,
  imageSizeMax: 20,
  textCanvas: {width:256, height:64},
  textFont: "24px Arial",
  textScale: 40
};

// ------------------- DETECT MOBILE -------------------
let isMobile = window.innerWidth < 768;
const CONFIG = isMobile ? MOBILE : PC;

// ------------------- SCENE & CAMERA -------------------
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.z = CONFIG.cameraZ;

// ------------------- RENDERER -------------------
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ------------------- CONTROLS -------------------
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.rotateSpeed = CONFIG.orbitRotateSpeed;
controls.enableZoom = true;
controls.zoomSpeed = CONFIG.orbitZoomSpeed;
controls.minDistance = 40;
controls.maxDistance = CONFIG.orbitMaxDistance;

// ------------------- STARS -------------------
let starGeo = new THREE.BufferGeometry();
let starVertices = [];
for(let i=0; i<CONFIG.stars; i++){
  starVertices.push(
    (Math.random()-0.5)*CONFIG.starRange,
    (Math.random()-0.5)*CONFIG.starRange,
    (Math.random()-0.5)*CONFIG.starRange
  );
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starVertices,3));
let starMat = new THREE.PointsMaterial({color:0xffffff, size:1.2});
let stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ------------------- IMAGES -------------------
let images=[], targets=[];
let loader = new THREE.TextureLoader();

// ------------------- TEXTS -------------------
let texts=[], sentences=[];

// ------------------- HEART SHAPE -------------------
function heart(t){
  let x = 16*Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x,y};
}

// ------------------- CREATE IMAGES -------------------
for(let i=0;i<CONFIG.totalImages;i++){
  let id = Math.floor(Math.random()*CONFIG.imageCount)+1;
  let texture = loader.load(`img/${id}.jpg`);
  let material = new THREE.MeshBasicMaterial({map:texture, side:THREE.DoubleSide});
  let size = Math.random()*(CONFIG.imageSizeMax-CONFIG.imageSizeMin)+CONFIG.imageSizeMin;
  let geometry = new THREE.PlaneGeometry(size,size);
  let mesh = new THREE.Mesh(geometry, material);

  let t = (i/CONFIG.totalImages)*Math.PI*2;
  let h = heart(t);
  mesh.position.set(h.x*2.2, h.y*2.2, 0);
  scene.add(mesh);
  images.push(mesh);

  targets.push(new THREE.Vector3(
    (Math.random()-0.5)*CONFIG.explodeRange,
    (Math.random()-0.5)*CONFIG.explodeRange,
    (Math.random()-0.5)*CONFIG.explodeRange
  ));
}

// ------------------- EXPLODE -------------------
let exploded=false;
function triggerExplode(){ exploded=true; }
window.addEventListener("click", triggerExplode);
window.addEventListener("touchstart", triggerExplode);

function explodeImages(){
  images.forEach((img,i)=>{ img.position.lerp(targets[i],0.03); });
}
function rotateImages(){
  images.forEach(img=>{
    img.rotation.y += isMobile ? 0.001 : 0.002;
    img.rotation.x += isMobile ? 0.0005 : 0.001;
  });
}

// ------------------- FLOATING TEXT -------------------
function createFloatingText(){
  if(sentences.length===0) return;
  let text = sentences[Math.floor(Math.random()*sentences.length)];
  let canvas = document.createElement("canvas");
  canvas.width = CONFIG.textCanvas.width;
  canvas.height = CONFIG.textCanvas.height;
  let ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.font = CONFIG.textFont;
  ctx.textAlign = "center";
  ctx.fillText(text, canvas.width/2, canvas.height/2 + 12);
  let texture = new THREE.CanvasTexture(canvas);
  let material = new THREE.SpriteMaterial({map:texture, transparent:true});
  let sprite = new THREE.Sprite(material);
  sprite.scale.set(CONFIG.textScale, CONFIG.textScale/4, 1);
  sprite.position.set(
    (Math.random()-0.5)*CONFIG.explodeRange,
    (Math.random()-0.5)*CONFIG.explodeRange,
    (Math.random()-0.5)*CONFIG.explodeRange
  );
  scene.add(sprite);
  texts.push(sprite);
}

// ------------------- LOAD SENTENCES -------------------
fetch("sentences.json")
.then(res=>res.json())
.then(data=>{
  sentences = data;
  for(let i=0;i<CONFIG.floatingTextCount;i++){ createFloatingText(); }
});

// ------------------- ANIMATE -------------------
function animate(){
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0003;

  if(exploded){ explodeImages(); rotateImages(); }

  texts.forEach(t=>{
    t.position.y += 0.02;
    if(t.position.y>400) t.position.y=-400;
  });

  controls.update();
  renderer.render(scene,camera);
}
animate();

// ------------------- RESIZE -------------------
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
