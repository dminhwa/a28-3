<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Heart Gallery</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#050015;
}
</style>

</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  5000
)
camera.position.z = 160

/* RENDERER */
let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)
document.body.appendChild(renderer.domElement)

/* CONTROLS */
let controls = new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.08
controls.enablePan = false
controls.rotateSpeed = 0.6
controls.enableZoom = true
controls.zoomSpeed = 1.4
controls.minDistance = 40
controls.maxDistance = 1200

/* STARS BACKGROUND */
let starGeo = new THREE.BufferGeometry()
let starVertices=[]
for(let i=0;i<6000;i++){
  starVertices.push(
    (Math.random()-0.5)*2000,
    (Math.random()-0.5)*2000,
    (Math.random()-0.5)*2000
  )
}
starGeo.setAttribute(
  "position",
  new THREE.Float32BufferAttribute(starVertices,3)
)
let starMat = new THREE.PointsMaterial({
  color:0xffffff,
  size:1.2
})
let stars = new THREE.Points(starGeo,starMat)
scene.add(stars)

/* IMAGES */
let images=[]
let targets=[]
let loader = new THREE.TextureLoader()
let imageCount = 75
let total = 120

/* TEXTS */
let texts=[]
let sentences=[]

/* HEART SHAPE */
function heart(t){
  let x = 16*Math.pow(Math.sin(t),3)
  let y = 13*Math.cos(t) -5*Math.cos(2*t) -2*Math.cos(3*t) - Math.cos(4*t)
  return {x,y}
}

/* CREATE IMAGES */
for(let i=0;i<total;i++){
  let id = Math.floor(Math.random()*imageCount)+1
  let texture = loader.load(`img/${id}.jpg`)
  let material = new THREE.MeshBasicMaterial({
    map:texture,
    side:THREE.DoubleSide
  })
  let size = Math.random()*20 + 10
  let geometry = new THREE.PlaneGeometry(size,size)
  let mesh = new THREE.Mesh(geometry,material)

  /* HEART POSITION */
  let t = (i/total)*Math.PI*2
  let h = heart(t)
  mesh.position.set(h.x*2.2,h.y*2.2,0)
  scene.add(mesh)
  images.push(mesh)

  /* RANDOM TARGET POSITION */
  targets.push(new THREE.Vector3(
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*800
  ))
}

/* EXPLODE STATE */
let exploded=false
window.addEventListener("click",()=>{
  if(!exploded){
    exploded=true
  }
})

/* EXPLODE ANIMATION */
function explodeImages(){
  images.forEach((img,i)=>{
    img.position.lerp(targets[i],0.03)
  })
}

/* IMAGE ROTATION */
function rotateImages(){
  images.forEach(img=>{
    img.rotation.y += 0.002
    img.rotation.x += 0.001
  })
}

/* CREATE FLOATING TEXT */
function createFloatingText(){
  let text = sentences[Math.floor(Math.random()*sentences.length)]
  let canvas = document.createElement("canvas")
  let ctx = canvas.getContext("2d")
  canvas.width = 1024
  canvas.height = 256
  ctx.fillStyle = "white"
  ctx.font = "40px Arial"
  ctx.textAlign = "center"
  ctx.fillText(text,256,70)
  let texture = new THREE.CanvasTexture(canvas)
  let material = new THREE.SpriteMaterial({
    map:texture,
    transparent:true
  })
  let sprite = new THREE.Sprite(material)
  sprite.scale.set(80,20,1)
  sprite.position.set(
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*800,
    (Math.random()-0.5)*800
  )
  scene.add(sprite)
  texts.push(sprite)
}

/* LOAD SENTENCES FROM JSON */
fetch("sentences.json")
.then(res=>res.json())
.then(data=>{
  sentences = data
  for(let i=0;i<400;i++){
    createFloatingText()
  }
})

/* ANIMATION LOOP */
function animate(){
  requestAnimationFrame(animate)
  stars.rotation.y += 0.0003

  if(exploded){
    explodeImages()
    rotateImages()
  }

  /* FLOATING TEXT */
  texts.forEach(t=>{
    t.position.y += 0.02
    if(t.position.y > 400) t.position.y = -400
  })

  controls.update()
  renderer.render(scene,camera)
}
animate()

/* WINDOW RESIZE */
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(window.innerWidth,window.innerHeight)
})

</script>

</body>
</html>
